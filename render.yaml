services:
  - type: web
    name: vismo-3d-viewer
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
